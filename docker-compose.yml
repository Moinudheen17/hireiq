version: "3.8"

services:
  backend:
    build: ./backend
    container_name: hireiq-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: hireiq-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped